<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK Patcher Web Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px; width: 100%; padding: 40px; }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .section { margin-bottom: 30px; }
        .section h2 { font-size: 16px; color: #333; margin-bottom: 15px; font-weight: 600; }
        .checkbox-group { display: flex; flex-direction: column; gap: 12px; }
        .checkbox { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .checkbox input { width: 18px; height: 18px; cursor: pointer; }
        .checkbox label { cursor: pointer; user-select: none; }
        input[type="file"] { display: block; width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; margin-bottom: 20px; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 30px; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .info { background: #f5f5f5; border-left: 4px solid #667eea; padding: 15px; border-radius: 4px; font-size: 13px; color: #666; margin-top: 20px; }
        .warning { color: #d32f2f; font-size: 13px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩹 APK Patcher</h1>
        <p class="subtitle">Client-side APK patching for security research</p>
        
        <div class="section">
            <h2>Select APK</h2>
            <input type="file" id="apkFile" accept=".apk" />
        </div>

        <div class="section">
            <h2>Patches</h2>
            <div class="checkbox-group">
                <div class="checkbox">
                    <input type="checkbox" id="sslBypass" checked />
                    <label for="sslBypass">SSL Certificate Pinning Bypass</label>
                </div>
                <div class="checkbox">
                    <input type="checkbox" id="rootBypass" checked />
                    <label for="rootBypass">Root Detection Bypass</label>
                </div>
                <div class="checkbox">
                    <input type="checkbox" id="debugMode" />
                    <label for="debugMode">Enable Debug Mode</label>
                </div>
            </div>
        </div>

        <button id="patchBtn" disabled>🔨 Patch APK (Processing not available in browser)</button>

        <div class="info">
            ℹ️ Browser-based patching is limited. For full functionality, use the Python tool:
            <br/><code style="display: block; margin-top: 8px; background: #f0f0f0; padding: 8px; border-radius: 4px;">python3 patch.py --apk target.apk --ssl-bypass --root-bypass --sign</code>
            <br/><span class="warning">⚠️ Educational use only. Never modify apps you don't own.</span>
        </div>
    </div>
</body>
</html>
